<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add a spot — WhereLoc</title>
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="components.css" />
  <!-- Leaflet (free, no API key) for the location picker -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <div id="navbar"></div>

  <main class="container" style="max-width:560px;padding:24px 16px 96px;">
    <h1 style="font-size:var(--fs-xl);margin-bottom:20px;">Add a spot</h1>
    <div id="upload-form-container"></div>
  </main>

  <script type="module">
    import { renderNavbar } from "./components/Navbar.js";
    import { renderUploadForm } from "./components/UploadForm.js";
    import { requireAuthOrRedirect } from "./js/auth.js";

    const user = await requireAuthOrRedirect();
    if (user) {
      renderNavbar(document.getElementById("navbar"));
      renderUploadForm(document.getElementById("upload-form-container"));
    }
  </script>
</body>
</html>
