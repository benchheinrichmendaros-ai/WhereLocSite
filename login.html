<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — WhereLoc</title>
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="components.css" />
</head>
<body>
  <div id="navbar"></div>

  <main class="container" style="max-width:420px;padding:48px 16px;">
    <h1 style="font-size:var(--fs-xl);margin-bottom:24px;">Log in</h1>

    <form id="login-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required />
      </div>
      <div id="form-error" class="field-error" style="display:none;margin-bottom:12px;"></div>
      <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Log in</button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:var(--fs-sm);color:var(--color-ink-muted);">
      New here? <a href="signup.html" style="color:var(--color-primary);">Sign up</a>
    </p>
  </main>

  <script type="module">
    import { renderNavbar } from "./components/Navbar.js";
    import { logIn, getCurrentProfile } from "./js/auth.js";

    renderNavbar(document.getElementById("navbar"));

    const form = document.getElementById("login-form");
    const errorBox = document.getElementById("form-error");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.style.display = "none";
      const submitBtn = document.getElementById("submit-btn");
      submitBtn.disabled = true;
      submitBtn.textContent = "Logging in...";

      try {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        await logIn(email, password);

        const profile = await getCurrentProfile();
        const params = new URLSearchParams(location.search);
        const next = params.get("next");

        if (!profile) {
          location.href = "username.html";
        } else {
          location.href = next || "home.html";
        }
      } catch (err) {
        errorBox.textContent = err.message || "Couldn't log in.";
        errorBox.style.display = "block";
        submitBtn.disabled = false;
        submitBtn.textContent = "Log in";
      }
    });
  </script>
</body>
</html>
