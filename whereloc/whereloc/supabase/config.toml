# ==========================================================================
# supabase/config.toml
# Used by the Supabase CLI when you run `supabase functions deploy`.
#
# verify_jwt = false: by default Supabase's gateway rejects any request
# without a valid JWT BEFORE it reaches our function code — including
# the browser's CORS preflight (OPTIONS) request, which has no auth
# header at all. That would break every cross-origin call from GitHub
# Pages. We turn platform-level verification off and do our own JWT
# check inside index.ts instead (supabaseAdmin.auth.getUser(token)),
# which still rejects unauthenticated requests — just at the right
# point in the flow.
# ==========================================================================

[functions.rate-limit]
verify_jwt = false
