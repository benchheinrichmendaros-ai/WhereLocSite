<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — WhereLoc</title>
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="components.css" />
</head>
<body>
  <div id="navbar"></div>

  <main class="container" style="max-width:420px;padding:48px 16px;">
    <h1 style="font-size:var(--fs-xl);margin-bottom:8px;">Create your account</h1>
    <p class="field-hint" style="margin-bottom:24px;">Email + password to start — you'll pick a display name next.</p>

    <form id="signup-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6" />
        <span class="field-hint">At least 6 characters.</span>
      </div>
      <div id="form-error" class="field-error" style="display:none;margin-bottom:12px;"></div>
      <div id="confirm-message" style="display:none;background:var(--color-bg-soft);padding:14px;border-radius:var(--radius-sm);margin-bottom:16px;font-size:var(--fs-sm);"></div>
      <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Sign up</button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:var(--fs-sm);color:var(--color-ink-muted);">
      Already have an account? <a href="login.html" style="color:var(--color-primary);">Log in</a>
    </p>
  </main>

  <script type="module">
    import { renderNavbar } from "./components/Navbar.js";
    import { signUp } from "./js/auth.js";

    renderNavbar(document.getElementById("navbar"));

    const form = document.getElementById("signup-form");
    const errorBox = document.getElementById("form-error");
    const confirmBox = document.getElementById("confirm-message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.style.display = "none";
      const submitBtn = document.getElementById("submit-btn");
      submitBtn.disabled = true;
      submitBtn.textContent = "Creating account...";

      try {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const { session } = await signUp(email, password);

        if (session) {
          // Email confirmation is off in this Supabase project — go
          // straight to username selection.
          location.href = "username.html";
        } else {
          // Email confirmation is on — they need to click the link first.
          form.style.display = "none";
          confirmBox.style.display = "block";
          confirmBox.textContent = `We sent a confirmation link to ${email}. Click it, then come back and log in.`;
        }
      } catch (err) {
        errorBox.textContent = err.message || "Something went wrong.";
        errorBox.style.display = "block";
        submitBtn.disabled = false;
        submitBtn.textContent = "Sign up";
      }
    });
  </script>
</body>
</html>
