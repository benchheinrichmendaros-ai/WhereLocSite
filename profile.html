<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — WhereLoc</title>
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="components.css" />
  <style>
    .profile-header { display: flex; align-items: center; gap: var(--space-4); padding: 24px 0; }
    .profile-header__avatar { width: 84px; height: 84px; border-radius: 50%; overflow: hidden; background: var(--color-bg-soft); border: 1.5px solid var(--color-border); flex-shrink: 0; position: relative; }
    .profile-header__avatar img { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <main class="container" style="max-width:640px;padding:0 16px 96px;">
    <div class="profile-header" id="profile-header"></div>
    <div id="edit-panel" style="display:none;margin-bottom:24px;"></div>
    <div id="profile-tabs"></div>
  </main>

  <script type="module">
    import { renderNavbar } from "./components/Navbar.js";
    import { renderProfileTabs } from "./components/ProfileTabs.js";
    import { requireAuthOrRedirect, getCurrentProfile, updateUsername, isUsernameTaken } from "./js/auth.js";
    import { updateAvatar } from "./js/api.js";
    import { placeholderAvatar } from "./components/Navbar.js";
    import { showToast } from "./components/Toast.js";

    const user = await requireAuthOrRedirect();
    if (!user) { /* redirected */ } else {
      renderNavbar(document.getElementById("navbar"));
      let profile = await getCurrentProfile();
      if (!profile) { location.href = "username.html"; }

      function renderHeader() {
        document.getElementById("profile-header").innerHTML = `
          <div class="profile-header__avatar">
            <img src="${profile.avatar_url || placeholderAvatar()}" alt="" />
          </div>
          <div style="flex:1;">
            <h1 style="font-size:var(--fs-lg);">${profile.username}</h1>
            <button class="btn btn-ghost" id="edit-toggle" style="padding-left:0;">Edit profile</button>
          </div>
        `;
        document.getElementById("edit-toggle").addEventListener("click", toggleEdit);
      }

      function toggleEdit() {
        const panel = document.getElementById("edit-panel");
        const isOpen = panel.style.display !== "none";
        if (isOpen) { panel.style.display = "none"; return; }

        panel.style.display = "block";
        panel.innerHTML = `
          <div class="field">
            <label for="avatar-input">Change avatar</label>
            <input type="file" id="avatar-input" accept="image/*" />
          </div>
          <div class="field">
            <label for="username-input">Username</label>
            <input type="text" id="username-input" value="${profile.username}" maxlength="24" />
            <span id="username-status" class="field-hint"></span>
          </div>
          <button class="btn btn-primary" id="save-profile-btn">Save changes</button>
        `;

        document.getElementById("avatar-input").addEventListener("change", async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          try {
            profile = await updateAvatar(file);
            renderHeader();
            showToast("Avatar updated");
          } catch (err) {
            showToast(err.message || "Couldn't update avatar");
          }
        });

        const usernameInput = document.getElementById("username-input");
        const status = document.getElementById("username-status");
        document.getElementById("save-profile-btn").addEventListener("click", async () => {
          const newName = usernameInput.value.trim();
          if (!newName || newName === profile.username) { panel.style.display = "none"; return; }
          try {
            const taken = await isUsernameTaken(newName);
            if (taken) { status.textContent = "That username is taken."; status.style.color = "var(--color-danger)"; return; }
            profile = await updateUsername(newName);
            panel.style.display = "none";
            renderHeader();
            showToast("Profile updated");
          } catch (err) {
            status.textContent = err.message || "Couldn't update username.";
            status.style.color = "var(--color-danger)";
          }
        });
      }

      renderHeader();
      renderProfileTabs(document.getElementById("profile-tabs"), user.id);
    }
  </script>
</body>
</html>
