<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse spots — WhereLoc</title>
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="components.css" />
</head>
<body>
  <div id="navbar"></div>

  <main class="container" style="padding:20px 16px 120px;">
    <div id="search-bar" style="margin-bottom:8px;"></div>
    <div class="spot-grid" id="spot-grid" style="margin-top:12px;">
      <p class="field-hint">Loading spots...</p>
    </div>
  </main>

  <button class="fab" id="fab" aria-label="Add a spot">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
  </button>

  <script type="module">
    import { renderNavbar } from "./components/Navbar.js";
    import { renderSearchBar } from "./components/SearchBar.js";
    import { spotCardHTML, attachSpotCardEvents } from "./components/SpotCard.js";
    import { getSpots } from "./js/api.js";
    import { getCurrentUser } from "./js/auth.js";
    import { pinMark } from "./components/icons.js";

    renderNavbar(document.getElementById("navbar"));

    const grid = document.getElementById("spot-grid");

    async function loadSpots(filters = {}) {
      grid.innerHTML = `<p class="field-hint">Loading spots...</p>`;
      try {
        const spots = await getSpots(filters);
        if (spots.length === 0) {
          grid.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1;">
              ${pinMark()}
              <p>No spots match yet. Be the first to add one nearby.</p>
            </div>`;
          return;
        }
        grid.innerHTML = spots.map(spotCardHTML).join("");
        grid.querySelectorAll(".spot-card").forEach((cardEl) => {
          const spot = spots.find((s) => s.id === cardEl.dataset.spotId);
          attachSpotCardEvents(cardEl, spot);
        });
      } catch {
        grid.innerHTML = `<p class="field-hint">Couldn't load spots right now.</p>`;
      }
    }

    renderSearchBar(document.getElementById("search-bar"), loadSpots);
    loadSpots();

    document.getElementById("fab").addEventListener("click", async () => {
      const user = await getCurrentUser();
      location.href = user ? "/upload.html" : "/login.html?next=/upload.html";
    });
  </script>
</body>
</html>
